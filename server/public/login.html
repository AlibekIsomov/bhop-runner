<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:,">
<title>bhop_endless — Sign In</title>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
  :root {
    --orange: #e0a13d;
    --ink: #e8f1f2;
    --panel: rgba(16, 18, 20, .88);
    --bg: #241a36;
    --glow: #ff82f5;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%; overflow: hidden; background: var(--bg);
    font-family: 'Inter', 'Arial Narrow', Arial, sans-serif;
    user-select: none; color: var(--ink);
  }

  /* Animated background */
  body::before {
    content: ''; position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(104,52,128,.5) 0%, transparent 60%),
      radial-gradient(ellipse at 70% 80%, rgba(255,130,245,.15) 0%, transparent 50%),
      linear-gradient(180deg, #1a1028 0%, #241a36 40%, #2a1636 100%);
  }

  .login-container {
    position: relative; z-index: 1;
    display: flex; align-items: center; justify-content: center;
    height: 100%;
  }

  .login-card {
    background: var(--panel);
    border: 1px solid rgba(255,255,255,.08);
    border-top: 3px solid var(--orange);
    border-radius: 8px;
    padding: 48px 52px 40px;
    width: 100%; max-width: 420px;
    text-align: center;
    backdrop-filter: blur(20px);
    box-shadow: 0 20px 60px rgba(0,0,0,.5), 0 0 80px rgba(255,130,245,.08);
    animation: fadeIn .6s ease-out;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo { margin-bottom: 6px; }
  .logo h1 {
    font-size: 38px; font-weight: 900;
    text-transform: lowercase; letter-spacing: .02em;
  }
  .logo h1 span { color: var(--orange); }
  .logo .sub {
    font-size: 11px; text-transform: uppercase;
    letter-spacing: .25em; opacity: .5; margin-top: 4px;
  }

  .divider {
    height: 1px; background: rgba(255,255,255,.08);
    margin: 28px 0;
  }

  /* Google Button */
  .btn-google {
    display: flex; align-items: center; justify-content: center; gap: 12px;
    width: 100%; padding: 14px 0;
    background: #4285f4; color: #fff;
    font-size: 14px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .12em;
    border: none; border-radius: 6px;
    cursor: pointer; transition: all .2s;
    text-decoration: none;
  }
  .btn-google:hover { background: #3367d6; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(66,133,244,.4); }
  .btn-google svg { width: 20px; height: 20px; }

  .or-text {
    position: relative; color: rgba(255,255,255,.25);
    font-size: 11px; text-transform: uppercase; letter-spacing: .3em;
    margin: 24px 0; display: flex; align-items: center; gap: 16px;
  }
  .or-text::before, .or-text::after {
    content: ''; flex: 1; height: 1px; background: rgba(255,255,255,.1);
  }

  /* Guest Login */
  .guest-input {
    width: 100%; padding: 12px 16px;
    background: rgba(255,255,255,.05);
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 6px; color: var(--ink);
    font-size: 14px; font-family: inherit;
    outline: none; margin-bottom: 12px;
    transition: border-color .2s;
  }
  .guest-input:focus { border-color: var(--orange); }
  .guest-input::placeholder { color: rgba(255,255,255,.3); }

  .btn-guest {
    width: 100%; padding: 13px 0;
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 6px; color: var(--ink);
    font-size: 13px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .18em;
    cursor: pointer; transition: all .2s;
  }
  .btn-guest:hover {
    background: rgba(255,255,255,.12);
    border-color: rgba(255,255,255,.2);
    transform: translateY(-1px);
  }

  .footer-note {
    margin-top: 28px; font-size: 10px;
    opacity: .3; letter-spacing: .08em;
  }

  .error-msg {
    color: #d9483b; font-size: 12px;
    margin-top: 10px; min-height: 18px;
    font-weight: 600;
  }
</style>
</head>
<body>

<div class="login-container">
  <div class="login-card">
    <div class="logo">
      <h1>bhop_<span>endless</span></h1>
      <div class="sub">counter-strike movement · random course</div>
    </div>

    <div class="divider"></div>

    <a href="/auth/google" class="btn-google">
      <svg viewBox="0 0 24 24" fill="white"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Sign in with Google
    </a>

    <div class="or-text">or</div>

    <input type="text" class="guest-input" id="guestName" placeholder="Enter your name..." maxlength="20" autocomplete="off">
    <button class="btn-guest" id="guestBtn">Play as Guest</button>
    <div class="error-msg" id="errorMsg"></div>

    <div class="footer-note">Your scores are saved to the global leaderboard</div>
  </div>
</div>

<script>
  // If already logged in, go straight to game
  if (localStorage.getItem('bhop_token')) {
    window.location.href = '/';
  }

  // Check URL for OAuth callback
  const params = new URLSearchParams(location.search);
  if (params.has('token')) {
    localStorage.setItem('bhop_token', params.get('token'));
    localStorage.setItem('bhop_user', JSON.stringify({
      username: params.get('username') || 'Player',
      avatar_url: params.get('avatar') || '',
      email: params.get('email') || ''
    }));
    window.location.href = '/';
  }


  // Guest login
  document.getElementById('guestBtn').addEventListener('click', guestLogin);
  document.getElementById('guestName').addEventListener('keydown', e => {
    if (e.key === 'Enter') guestLogin();
  });

  async function guestLogin() {
    const name = document.getElementById('guestName').value.trim();
    const errorEl = document.getElementById('errorMsg');
    if (!name) {
      errorEl.textContent = 'Please enter a name';
      document.getElementById('guestName').focus();
      return;
    }
    errorEl.textContent = '';
    try {
      const resp = await fetch('/auth/dev-login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: name })
      });
      const data = await resp.json();
      if (data.token) {
        localStorage.setItem('bhop_token', data.token);
        localStorage.setItem('bhop_user', JSON.stringify(data.user));
        window.location.href = '/';
      } else {
        errorEl.textContent = 'Login failed. Try again.';
      }
    } catch (e) {
      errorEl.textContent = 'Connection error. Is the server running?';
    }
  }
</script>
</body>
</html>
